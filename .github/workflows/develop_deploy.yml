name: Build & Deploy to developui.yanibooks.com

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Clean server directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: server.atyanitechnologies.com
          username: yanisolutions
          port: 25917
          key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: server.atyanitechnologies.com
          username: yanisolutions
          port: 25917
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/yanibooks/public_html/developui.yanibooks.com/"
          overwrite: true
